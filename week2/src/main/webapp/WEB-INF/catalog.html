<!DOCTYPE html>
<html>
<head>
<title>Catalog</title>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="text-white">Shop</span>
  <div>

</nav>

<div class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h5>Product 1</h5>

        <button class="btn btn-primary" onclick="addToCart('Product 1',500)">Add</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h5>Product 2</h5>
        <p>₹800</p>
        <button class="btn btn-primary" onclick="addToCart('Product 2',800)">Add</button>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
