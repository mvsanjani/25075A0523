<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <div class="card p-4 mx-auto" style="max-width:400px;">
    <h3>Login</h3>

    <input id="loginUser" class="form-control my-2" placeholder="Username">
    <input id="loginPass" type="password" class="form-control my-2" placeholder="Password">

    <button class="btn btn-success w-100" onclick="login()">Login</button>

    <a href="register.html" class="mt-2 d-block text-center">Register</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
