<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worldwide Weather App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; text-align: center; background: #f0f8ff; }
    input, button { padding: 10px; margin: 10px; font-size: 16px;  color:green}
    #weatherInfo { margin-top: 20px; font-size: 18px; }
    canvas { margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <h2>Worldwide Weather App</h2>
  <input type="text" id="cityInput" placeholder="Enter city (e.g., Paris, New York)">
  <button id="getWeatherBtn">Get Weather</button>

  <div id="weatherInfo"></div>
  <canvas id="weatherChart"></canvas>

  <script src="script.js"></script>
</body>
</html>
