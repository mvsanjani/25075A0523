<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Worldwide Weather App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #eef3f7;
  }

  h2 {
    margin-top: 20px;
  }

  input, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
  }

  button {
    color: green;
  }

  #weatherInfo {
    margin-top: 20px;
  }

  #chartBox {
    width: 600px;
    height: 300px;
    margin: 20px auto;
  }
</style>

</head>

<body>

<h2>Worldwide Weather App</h2>

<input id="city" placeholder="Enter city">
<button onclick="getWeather()">Get Weather</button>

<div id="weatherInfo"></div>

<div id="chartBox">
  <canvas id="chart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
